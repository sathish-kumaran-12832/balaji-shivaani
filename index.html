<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Balaji & Shivaani — Wedding Invitation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            wedding: {
              red: '#D20000',
              blue: '#005594',
              'blue-light': '#487FBF',
              'blue-muted': '#275A84',
              'blue-deep': '#005494',
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* ---- Scroll-jacked wrapper (no native scroll) ---- */
    #app {
      width: 100%;
      max-width: 412px;
      height: 100vh;
      height: 100dvh;
      margin: 0 auto;
      overflow: hidden;
      position: relative;
      background: #f5f6f0;
    }

    /* ---- All screens stacked on top of each other ---- */
    .screen {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      will-change: transform, clip-path;
      /* Incoming screens start below (pushed down) */
      transform: translateY(100%);
    }
    /* Active screen: fully visible */
    .screen.is-active {
      transform: translateY(0);
      z-index: 2;
    }
    /* Previous screen sits behind, scales down as next slides over */
    .screen.is-prev {
      transform: translateY(0) scale(1);
      z-index: 1;
    }
    /* Future screens hidden below */
    .screen.is-next {
      transform: translateY(100%);
      z-index: 3;
    }

    /* ---- Background photo ---- */
    .screen-bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      pointer-events: none;
      z-index: 0;
      will-change: transform;
    }

    /* ---- Content layer sits above BG ---- */
    .screen-content {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ---- Scroll-reveal animation ---- */
    .anim {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s cubic-bezier(.22,1,.36,1), transform 0.8s cubic-bezier(.22,1,.36,1);
    }
    .anim.show {
      opacity: 1;
      transform: translateY(0);
    }
    .anim-d1 { transition-delay: 0.15s; }
    .anim-d2 { transition-delay: 0.3s; }
    .anim-d3 { transition-delay: 0.45s; }
    .anim-d4 { transition-delay: 0.6s; }
    .anim-d5 { transition-delay: 0.75s; }

    .anim-scale {
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 0.7s ease-out, transform 0.7s ease-out;
    }
    .anim-scale.show {
      opacity: 1;
      transform: scale(1);
    }

    /* ---- Lantern float (Screen 1 only) ---- */
    @keyframes floatA {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(2deg); }
    }
    @keyframes floatB {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-7px) rotate(-1.5deg); }
    }
    @keyframes floatC {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-13px) rotate(1deg); }
    }
    .ln-a { animation: floatA 4s ease-in-out infinite; }
    .ln-b { animation: floatB 5s ease-in-out 0.5s infinite; }
    .ln-c { animation: floatC 4.5s ease-in-out 1s infinite; }

    /* ---- Lantern fade-in on load ---- */
    .ln-reveal {
      opacity: 0;
      transform: translateY(20px);
      animation: lnFadeIn 0.8s ease-out forwards;
    }
    @keyframes lnFadeIn {
      to { opacity: 1; transform: translateY(0); }
    }
    .ln-reveal-d1 { animation-delay: 0.1s; }
    .ln-reveal-d2 { animation-delay: 0.2s; }
    .ln-reveal-d3 { animation-delay: 0.35s; }
    .ln-reveal-d4 { animation-delay: 0.5s; }
    .ln-reveal-d5 { animation-delay: 0.65s; }
    .ln-reveal-d6 { animation-delay: 0.8s; }
    .ln-reveal-d7 { animation-delay: 0.95s; }
    .ln-reveal-d8 { animation-delay: 1.1s; }

    /* ---- Screen transition progress indicator ---- */
    .screen-progress {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 100;
      pointer-events: none;
    }
    .screen-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transition: background .4s, transform .4s cubic-bezier(.22,1,.36,1);
    }
    .screen-dot.active {
      background: rgba(255,255,255,0.9);
      transform: scale(1.5);
    }

    /* ---- Floating golden particles ---- */
    .particles {
      position: absolute; inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 2;
    }
    @keyframes particleRise {
      0%   { opacity: 0; transform: translateY(0) scale(0.5); }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.5; }
      100% { opacity: 0; transform: translateY(-100dvh) scale(0.2); }
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: particleRise linear infinite;
      will-change: transform, opacity;
    }

    /* ---- Glow pulse (couple photo) ---- */
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 6px rgba(255,200,50,0.15); }
      50%      { box-shadow: 0 0 22px rgba(255,200,50,0.45), 0 0 40px rgba(210,0,0,0.15); }
    }
    .glow-pulse { animation: glowPulse 3s ease-in-out infinite; border-radius: 50%; }

    /* ---- Enhanced reveal: blur-in ---- */
    .anim-blur {
      opacity: 0;
      filter: blur(8px);
      transform: translateY(40px) scale(0.96);
      transition: opacity .9s cubic-bezier(.22,1,.36,1),
                  filter .9s cubic-bezier(.22,1,.36,1),
                  transform .9s cubic-bezier(.22,1,.36,1);
    }
    .anim-blur.show { opacity: 1; filter: blur(0); transform: translateY(0) scale(1); }

    /* ---- Slide from left ---- */
    .anim-left {
      opacity: 0;
      transform: translateX(-50px) rotate(-2deg);
      transition: opacity .8s cubic-bezier(.22,1,.36,1), transform .8s cubic-bezier(.22,1,.36,1);
    }
    .anim-left.show { opacity: 1; transform: translateX(0) rotate(0); }

    /* ---- Slide from right ---- */
    .anim-right {
      opacity: 0;
      transform: translateX(50px) rotate(2deg);
      transition: opacity .8s cubic-bezier(.22,1,.36,1), transform .8s cubic-bezier(.22,1,.36,1);
    }
    .anim-right.show { opacity: 1; transform: translateX(0) rotate(0); }

    /* ---- Zoom + rotate entrance ---- */
    .anim-zoom {
      opacity: 0;
      transform: scale(.6) rotate(-5deg);
      transition: opacity 1s cubic-bezier(.22,1,.36,1), transform 1s cubic-bezier(.22,1,.36,1);
    }
    .anim-zoom.show { opacity: 1; transform: scale(1) rotate(0); }

    /* ---- Bounce entrance ---- */
    .anim-bounce {
      opacity: 0;
      transform: translateY(60px);
      transition: opacity .6s ease-out, transform .8s cubic-bezier(.34,1.56,.64,1);
    }
    .anim-bounce.show { opacity: 1; transform: translateY(0); }

    /* ---- Countdown colon pulse ---- */
    @keyframes colonPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .colon-pulse { animation: colonPulse 1s ease-in-out infinite; }
  </style>
</head>

<body>
  <div id="app">

    <!-- Screen progress dots -->

      <div class="screen-dot" data-dot="1"></div>

      <img src="./assets/lantern 3.svg" alt="" aria-hidden="true" class="absolute ln-c ln-reveal ln-reveal-d2" style="top:3%;right:8%;width:99px;">
      <img src="./assets/lantern 7.svg" alt="" aria-hidden="true" class="absolute ln-a ln-reveal ln-reveal-d4" style="top:9%;right:15%;width:55px;">
      <img src="./assets/lantern 5.svg" alt="" aria-hidden="true" class="absolute ln-b ln-reveal ln-reveal-d6" style="top:25%;right:4%;width:43px;">
      <img src="./assets/lantern 6.svg" alt="" aria-hidden="true" class="absolute ln-c ln-reveal ln-reveal-d7" style="top:40%;right:9%;width:65px;">

    <section class="screen">
      <img src="./assets/I 2 1.svg" alt="Couple with temple" class="screen-bg">

      <div class="screen-content">
        <img src="./assets/Balaji & Shivaani.svg" alt="Balaji & Shivaani"
             class="anim-blur absolute" style="top:25%;width:225px;">
        <img src="./assets/With grateful hearts, we invite you to share in the celebration of our wedding and the beginning of our forever..svg"
             alt="With grateful hearts, we invite you to share in the celebration of our wedding and the beginning of our forever."
             class="anim-blur anim-d1 absolute" style="top:47%;width:305px;">

    </section>

    <!-- ═══════════════════════════════════════════════
         SCREEN 3 — Event Details: Reception & Wedding

    <section class="screen">
      <img src="./assets/I 3 1.svg" alt="Wedding venue" class="screen-bg">

      <div class="screen-content justify-center">
        <div class="flex flex-col items-center w-full px-5" style="gap:15rem;">

          <!-- Event Card 1: Reception -->

    <!-- ═══════════════════════════════════════════════

      <div class="screen-content justify-start" style="padding-top:50%;">
        <div class="flex flex-col items-center px-6" style="gap:1.75rem;">
          <img src="./assets/See the route.svg" alt="See the route"
               class="anim-bounce" style="width:240px;">

    <!-- ═══════════════════════════════════════════════
         SCREEN 5 — Countdown + Closing
         ═══════════════════════════════════════════════ -->
    <section class="screen">
      <img src="./assets/I 5 1.svg" alt="Celebration photo" class="screen-bg">

      <!-- Golden floating particles -->
      <div id="particles-5" class="particles"></div>

      <div class="screen-content" style="top:25%;">
        <div class="flex flex-col items-center gap-6 px-6">
          <!-- Countdown heading -->
          <img src="./assets/The countdown begins.svg" alt="The countdown begins"
               class="anim-blur" style="width:332px;">

          <!-- Live Countdown Timer -->
          <div id="countdown-live" class="anim-blur anim-d1 flex items-baseline justify-center gap-[2px]" aria-label="Countdown to wedding">

            <span class="text-[30px] font-bold text-wedding-red colon-pulse" style="font-family:'Playfair Display',Georgia,serif;font-style:italic;">:</span>
            <span id="minutes" class="text-[35px] font-bold text-wedding-red" style="font-family:'Playfair Display',Georgia,serif;font-style:italic;">00</span>
            <span class="text-[30px] font-bold text-wedding-red colon-pulse" style="font-family:'Playfair Display',Georgia,serif;font-style:italic;">:</span>

          <!-- Post-event message (hidden until wedding date passes) -->
          <div id="post-event-msg" class="anim-blur hidden text-center" style="max-width:320px;">
            <p class="text-xl font-semibold text-wedding-blue" style="font-family:'Playfair Display',Georgia,serif;font-style:italic;">Thank you for being part of our beautiful journey together. Our forever has begun!</p>

  <!-- ═══════════════════════════════════════════════
       Scripts
       ═══════════════════════════════════════════════ -->
  <script>
    (function () {
      var app = document.getElementById('app');
      var screens = Array.prototype.slice.call(document.querySelectorAll('.screen'));
      var dots = Array.prototype.slice.call(document.querySelectorAll('.screen-dot'));
      var total = screens.length;
      var current = 0;
      var isAnimating = false;
      var DURATION = 1000; // ms for transition

      /* ---- Initialize: first screen active ---- */
      screens[0].classList.add('is-active');
      screens[0].style.transform = 'translateY(0)';

      /* ---- Show content animations for a screen ---- */
      function revealContent(idx) {
        var items = screens[idx].querySelectorAll('.anim, .anim-scale, .anim-blur, .anim-left, .anim-right, .anim-zoom, .anim-bounce');
        // Small delay so transform settles first
        setTimeout(function () {
          for (var i = 0; i < items.length; i++) items[i].classList.add('show');
        }, 150);
      }

      /* ---- Hide content animations for a screen ---- */
      function hideContent(idx) {
        var items = screens[idx].querySelectorAll('.anim, .anim-scale, .anim-blur, .anim-left, .anim-right, .anim-zoom, .anim-bounce');
        for (var i = 0; i < items.length; i++) items[i].classList.remove('show');
      }

      /* ---- Update progress dots ---- */
      function updateDots(idx) {
        for (var i = 0; i < dots.length; i++) {
          dots[i].classList.toggle('active', i === idx);
        }
      }

      /* ---- Easing: cubic bezier approximation ---- */
      function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }

      /* ═══════════════════════════════════════════════
         GO TO NEXT SCREEN
         Next screen slides up from bottom over current.
         Current screen scales down + fades underneath.
         ═══════════════════════════════════════════════ */
      function goNext() {
        if (isAnimating || current >= total - 1) return;
        isAnimating = true;
        var from = current;
        var to = current + 1;

        hideContent(from);

        // Prepare incoming screen
        screens[to].style.transform = 'translateY(100%)';
        screens[to].style.zIndex = 3;
        screens[to].classList.add('is-next');

        // Current becomes background
        screens[from].style.zIndex = 1;

        var start = performance.now();

        function animate(now) {
          var elapsed = now - start;
          var t = Math.min(elapsed / DURATION, 1);
          var ease = easeInOutCubic(t);

          // Incoming slides up
          var slideY = 100 * (1 - ease);
          screens[to].style.transform = 'translateY(' + slideY.toFixed(2) + '%)';

          // Outgoing scales down + fades
          var s = 1 - ease * 0.06;           // 1 → 0.94
          var o = 1 - ease * 0.4;            // 1 → 0.6
          var r = ease * 16;                 // 0 → 16px
          screens[from].style.transform = 'scale(' + s.toFixed(4) + ')';
          screens[from].style.opacity = o.toFixed(3);
          screens[from].style.borderRadius = r.toFixed(1) + 'px';

          if (t < 1) {
            requestAnimationFrame(animate);
          } else {
            // Finalize
            screens[to].style.transform = 'translateY(0)';
            screens[to].style.zIndex = 2;
            screens[to].classList.remove('is-next');
            screens[to].classList.add('is-active');

            screens[from].classList.remove('is-active');
            screens[from].classList.add('is-prev');
            screens[from].style.transform = 'scale(0.94)';
            screens[from].style.opacity = '0.6';
            screens[from].style.borderRadius = '16px';
            screens[from].style.zIndex = 1;

            current = to;
            updateDots(current);
            revealContent(current);

            // Cooldown
            setTimeout(function () { isAnimating = false; }, 100);
          }
        }
        requestAnimationFrame(animate);
      }

      /* ═══════════════════════════════════════════════
         GO TO PREVIOUS SCREEN
         Current screen slides down revealing previous.
         Previous screen scales up + fades in from behind.
         ═══════════════════════════════════════════════ */
      function goPrev() {
        if (isAnimating || current <= 0) return;
        isAnimating = true;
        var from = current;
        var to = current - 1;

        hideContent(from);

        // Previous is already behind, restore it
        screens[to].style.zIndex = 1;
        screens[to].classList.add('is-prev');

        // Current will slide down
        screens[from].style.zIndex = 3;

        var start = performance.now();

        function animate(now) {
          var elapsed = now - start;
          var t = Math.min(elapsed / DURATION, 1);
          var ease = easeInOutCubic(t);

          // Current slides down
          var slideY = 100 * ease;
          screens[from].style.transform = 'translateY(' + slideY.toFixed(2) + '%)';

          // Previous scales back up + fades in
          var s = 0.94 + ease * 0.06;        // 0.94 → 1
          var o = 0.6 + ease * 0.4;          // 0.6 → 1
          var r = 16 * (1 - ease);            // 16 → 0
          screens[to].style.transform = 'scale(' + s.toFixed(4) + ')';
          screens[to].style.opacity = o.toFixed(3);
          screens[to].style.borderRadius = r.toFixed(1) + 'px';

          if (t < 1) {
            requestAnimationFrame(animate);
          } else {
            // Finalize
            screens[to].style.transform = 'scale(1)';
            screens[to].style.opacity = '1';
            screens[to].style.borderRadius = '0px';
            screens[to].style.zIndex = 2;
            screens[to].classList.remove('is-prev');
            screens[to].classList.add('is-active');

            screens[from].classList.remove('is-active');
            screens[from].style.transform = 'translateY(100%)';
            screens[from].style.opacity = '1';
            screens[from].style.borderRadius = '0px';
            screens[from].style.zIndex = 0;

            current = to;
            updateDots(current);
            revealContent(current);

            setTimeout(function () { isAnimating = false; }, 100);
          }
        }
        requestAnimationFrame(animate);
      }

      /* ═══════════════════════════════════════════════
         Input Handlers: Wheel, Touch, Keyboard
         ═══════════════════════════════════════════════ */

      // Wheel (desktop)
      var wheelAccum = 0;
      var WHEEL_THRESHOLD = 50;
      var wheelTimer = null;

      app.addEventListener('wheel', function (e) {
        e.preventDefault();
        if (isAnimating) return;
        wheelAccum += e.deltaY;
        clearTimeout(wheelTimer);
        wheelTimer = setTimeout(function () { wheelAccum = 0; }, 200);
        if (wheelAccum > WHEEL_THRESHOLD) { wheelAccum = 0; goNext(); }
        else if (wheelAccum < -WHEEL_THRESHOLD) { wheelAccum = 0; goPrev(); }
      }, { passive: false });

      // Touch (mobile)
      var touchStartY = 0;
      var touchStartTime = 0;
      var SWIPE_MIN = 40;

      app.addEventListener('touchstart', function (e) {
        touchStartY = e.touches[0].clientY;
        touchStartTime = Date.now();
      }, { passive: true });

      app.addEventListener('touchend', function (e) {
        if (isAnimating) return;
        var dy = touchStartY - e.changedTouches[0].clientY;
        var dt = Date.now() - touchStartTime;
        if (dt > 600) return; // ignore slow drags
        if (dy > SWIPE_MIN) goNext();
        else if (dy < -SWIPE_MIN) goPrev();
      }, { passive: true });

      // Keyboard
      document.addEventListener('keydown', function (e) {
        if (e.key === 'ArrowDown' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); goNext(); }
        if (e.key === 'ArrowUp' || e.key === 'PageUp') { e.preventDefault(); goPrev(); }
      });

      /* ---- Initial reveal for screen 1 ---- */
      revealContent(0);

      /* ═══════════════════════════════════════════════
         Golden Particle Generator
         Spawns floating sparkles on hero & countdown screens
         ═══════════════════════════════════════════════ */
      var particleColors = [
        'rgba(255,215,0,0.6)',
        'rgba(255,200,50,0.5)',
        'rgba(255,180,0,0.4)',
        'rgba(255,255,220,0.5)',
        'rgba(255,230,100,0.35)'
      ];

      function spawnParticles(containerId, count) {
        var cont = document.getElementById(containerId);
        if (!cont) return;
        for (var i = 0; i < count; i++) {
          var p = document.createElement('div');
          p.className = 'particle';
          var size = (Math.random() * 4 + 2).toFixed(1);
          var left = (Math.random() * 100).toFixed(1);
          var dur = (Math.random() * 8 + 6).toFixed(1);
          var delay = (Math.random() * 12).toFixed(1);
          var c = particleColors[Math.floor(Math.random() * particleColors.length)];
          p.style.cssText = 'width:' + size + 'px;height:' + size + 'px;left:' + left + '%;bottom:-10px;background:' + c + ';animation-duration:' + dur + 's;animation-delay:' + delay + 's;';
          cont.appendChild(p);
        }
      }

      spawnParticles('particles-1', 18);
      spawnParticles('particles-5', 14);

      /* ---- Live Countdown → 17 May 2026, 7 PM IST ---- */
      var target = new Date('2026-05-17T19:00:00+05:30').getTime();
      var $d = document.getElementById('days');
      var $h = document.getElementById('hours');
      var $m = document.getElementById('minutes');
      var $s = document.getElementById('seconds');
      var countdownEl = document.getElementById('countdown-live');
      var postMsg = document.getElementById('post-event-msg');

      function pad(n) { return (n < 10 ? '0' : '') + n; }

      function tick() {
        var diff = target - Date.now();
        if (diff <= 0) {
          /* Wedding has passed — hide timer, show message */
          countdownEl.classList.add('hidden');
          postMsg.classList.remove('hidden');
          return;
        }
        $d.textContent = pad(Math.floor(diff / 864e5));
        $h.textContent = pad(Math.floor((diff % 864e5) / 36e5));
        $m.textContent = pad(Math.floor((diff % 36e5) / 6e4));
        $s.textContent = pad(Math.floor((diff % 6e4) / 1e3));
      }

      tick();
      setInterval(tick, 1000);
    })();
  </script>

</body>

</html>
